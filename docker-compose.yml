services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=your-secret-key-here
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=mysecretpassword
      - DB_NAME=my_guy
      - DB_SSL_MODE=disable
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - myguy-network

  store-service:
    build:
      context: ./store-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - JWT_SECRET=your-secret-key-here
      - DB_CONNECTION=host=postgres-db user=postgres password=mysecretpassword dbname=my_guy port=5432 sslmode=disable
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - myguy-network

  chat-websocket-service:
    build:
      context: ./chat-websocket-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - NODE_ENV=development
      - JWT_SECRET=your-secret-key-here
      - DB_CONNECTION=postgresql://postgres:mysecretpassword@postgres-db:5432/my_guy
      - CLIENT_URL=http://localhost:5173
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - myguy-network

  postgres-db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
      - POSTGRES_DB=my_guy
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - myguy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  myguy-network:
    driver: bridge
