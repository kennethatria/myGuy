services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=your-secret-key-here
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=mysecretpassword
      - DB_NAME=my_guy
      - DB_SSL_MODE=disable
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - myguy-network

  store-service:
    build:
      context: ./store-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - JWT_SECRET=your-secret-key-here
      # Separate store database
      - DB_CONNECTION=host=postgres-db user=postgres password=mysecretpassword dbname=my_guy_store port=5432 sslmode=disable
      # Chat service integration for booking notifications
      - CHAT_API_URL=http://chat-websocket-service:8082/api/v1
      - INTERNAL_API_KEY=your-internal-api-key-change-in-production
    volumes:
      - store-uploads:/app/uploads
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - myguy-network

  chat-websocket-service:
    build:
      context: ./chat-websocket-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - NODE_ENV=development
      - JWT_SECRET=your-secret-key-here
      # Separate chat database
      - DB_CONNECTION=postgresql://postgres:mysecretpassword@postgres-db:5432/my_guy_chat
      - DATABASE_URL=postgresql://postgres:mysecretpassword@postgres-db:5432/my_guy_chat
      - CLIENT_URL=http://localhost:5173
      # API URLs for cross-service validation
      - MAIN_API_URL=http://api:8080/api/v1
      - STORE_API_URL=http://store-service:8081/api/v1
      # Internal API key for secure inter-service communication
      - INTERNAL_API_KEY=your-internal-api-key-change-in-production
      # Redis for horizontal scaling (optional - enables multi-instance mode)
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
      store-service:
        condition: service_started
    networks:
      - myguy-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - myguy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Optional: Redis persistence configuration
    command: redis-server --appendonly yes

  postgres-db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
      - POSTGRES_DB=my_guy
      # Create multiple databases for microservices
      - POSTGRES_MULTIPLE_DATABASES=my_guy,my_guy_chat,my_guy_store
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Script to create multiple databases on startup
      - ./scripts/create-multiple-databases.sh:/docker-entrypoint-initdb.d/create-databases.sh
    networks:
      - myguy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  store-uploads:
  redis-data:

networks:
  myguy-network:
    driver: bridge
