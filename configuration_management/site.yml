# site.yml - Base provisioning: packages, runtime dependencies, VPC networking

---
- name: Configure app instance base
  hosts: "{{ target | default('app') }}"
  become: yes

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Enable universe repository
      ansible.builtin.apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_facts['distribution_release'] }} universe"
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Update apt cache after enabling universe
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install packages
      ansible.builtin.apt:
        name:
          - git
          - curl
          - podman
          - podman-compose
          - nginx
          - certbot
          - python3-certbot-nginx
          - libnginx-mod-http-modsecurity
        state: present

    # --- Swap (build headroom on 1GB nanode) ---

    - name: Create swapfile
      ansible.builtin.command:
        cmd: fallocate -l 1536M /swapfile
        creates: /swapfile

    - name: Set swapfile permissions
      ansible.builtin.file:
        path: /swapfile
        mode: "0600"

    - name: Format swapfile
      ansible.builtin.command:
        cmd: mkswap /swapfile
        creates: /proc/swaps  # only a rough guard — mkswap is idempotent

    - name: Enable swapfile
      ansible.builtin.command:
        cmd: swapon /swapfile
      register: swapon_result
      failed_when: swapon_result.rc != 0 and 'already in use' not in swapon_result.stderr
      changed_when: swapon_result.rc == 0

    - name: Persist swapfile in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present

    # --- VPC Network Interface ---

    - name: Write VPC netplan config
      ansible.builtin.copy:
        dest: /etc/netplan/05-vpc.yaml
        mode: "0600"
        content: |
          network:
            version: 2
            renderer: networkd
            ethernets:
              eth1:
                dhcp4: false
                addresses:
                  - {{ vpc_ip }}/24

    - name: Apply netplan configuration
      ansible.builtin.command:
        cmd: netplan apply
      changed_when: false
