# site.yml - Install dev tools on the remote server

---
- name: Configure development environment
  hosts: "{{ target | default('app') }}"
  become: yes

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Enable universe repository
      ansible.builtin.apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_facts['distribution_release'] }} universe"
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Update apt cache after enabling universe
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install Podman
      ansible.builtin.apt:
        name: podman
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Install Node.js and dependencies
      ansible.builtin.apt:
        name:
          - git
          - curl
          - nodejs
          - npm
          - podman
          - nginx
        state: present

    # --- Falco ---

    - name: Download Falco GPG key
      ansible.builtin.get_url:
        url: https://falco.org/repo/falcosecurity-packages.asc
        dest: /tmp/falcosecurity-packages.asc
        mode: "0644"

    - name: Dearmor Falco GPG key
      ansible.builtin.shell:
        cmd: gpg --dearmor -o /usr/share/keyrings/falco-archive-keyring.gpg /tmp/falcosecurity-packages.asc
        creates: /usr/share/keyrings/falco-archive-keyring.gpg

    - name: Add Falco apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/falco-archive-keyring.gpg] https://download.falco.org/packages/deb stable main"
        filename: falcosecurity
        state: present

    - name: Install kernel headers
      ansible.builtin.apt:
        name: "linux-headers-{{ ansible_kernel }}"
        state: present
        update_cache: yes

    - name: Install Falco
      ansible.builtin.apt:
        name: falco
        state: present

    - name: Enable Falco native Prometheus metrics
      ansible.builtin.blockinfile:
        path: /etc/falco/falco.yaml
        marker: "# {mark} ANSIBLE MANAGED - metrics"
        block: |
          metrics:
            enabled: true
            listen_port: 8765
            interval: 1h
            output_rule: true
            rules_counters_enabled: true
            resource_utilization_enabled: true
            state_counters_enabled: true
            kernel_event_counters_enabled: true
            libbpf_stats_enabled: true
            convert_memory_to_mb: true
            include_empty_values: false

    - name: Enable and start Falco service
      ansible.builtin.service:
        name: falco
        state: restarted
        enabled: yes

    # --- node_exporter (CPU/memory metrics for Prometheus) ---

    - name: Download node_exporter
      ansible.builtin.get_url:
        url: https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz
        dest: /tmp/node_exporter.tar.gz
        mode: "0644"

    - name: Extract node_exporter
      ansible.builtin.unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp
        remote_src: yes

    - name: Install node_exporter binary
      ansible.builtin.copy:
        src: /tmp/node_exporter-1.8.2.linux-amd64/node_exporter
        dest: /usr/local/bin/node_exporter
        mode: "0755"
        remote_src: yes

    - name: Create node_exporter systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus node_exporter
          After=network.target

          [Service]
          ExecStart=/usr/local/bin/node_exporter \
            --collector.disable-defaults \
            --collector.cpu \
            --collector.meminfo
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        enabled: yes
        state: started
        daemon_reload: yes


