# site.yml - Install dev tools on the remote server

---
- name: Configure development environment
  hosts: "{{ target | default('local') }}"
  become: yes

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Podman
      ansible.builtin.apt:
        name: podman
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Node.js and dependencies
      ansible.builtin.apt:
        name:
          - git
          - curl
          - nodejs
          - npm
          - docker-compose
        state: present
