# monitoring.yml - Install Zipkin, Prometheus, Grafana, and Loki on the monitoring instance

---
- name: Configure monitoring instance
  hosts: monitoring
  become: yes

  handlers:
    - name: restart grafana
      ansible.builtin.command:
        cmd: podman restart grafana
      changed_when: false

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Enable universe repository
      ansible.builtin.apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_facts['distribution_release'] }} universe"
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Update apt cache after enabling universe
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install Podman
      ansible.builtin.apt:
        name: podman
        state: present
      when: ansible_facts['os_family'] == "Debian"

    # --- Zipkin ---

    - name: Run Zipkin container
      containers.podman.podman_container:
        name: zipkin
        image: docker.io/openzipkin/zipkin
        state: started
        ports:
          - "9411:9411"
        restart_policy: always

    - name: Generate Zipkin systemd service
      ansible.builtin.command:
        cmd: podman generate systemd --name zipkin --files
        chdir: /etc/systemd/system
      changed_when: false

    - name: Enable and start Zipkin systemd service
      ansible.builtin.systemd:
        name: container-zipkin
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Set zipkin_url fact for use by other plays
      ansible.builtin.set_fact:
        zipkin_url: "http://{{ ansible_host }}:9411/api/v2/spans"

    # --- Prometheus ---

    - name: Create Prometheus config directory
      ansible.builtin.file:
        path: /etc/prometheus
        state: directory
        mode: "0755"

    - name: Write Prometheus config
      ansible.builtin.copy:
        dest: /etc/prometheus/prometheus.yml
        mode: "0644"
        content: |
          global:
            scrape_interval: 15s

          scrape_configs:
            - job_name: node_exporter
              static_configs:
                - targets: ['{{ instance_vpc_ip }}:{{ node_exporter_port }}']
                  labels:
                    instance: app

            - job_name: falco
              static_configs:
                - targets: ['{{ instance_vpc_ip }}:{{ falco_metrics_port }}']
                  labels:
                    instance: app

    - name: Run Prometheus container
      containers.podman.podman_container:
        name: prometheus
        image: docker.io/prom/prometheus:latest
        state: started
        ports:
          - "9090:9090"
        volumes:
          - /etc/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        restart_policy: always

    - name: Generate Prometheus systemd service
      ansible.builtin.command:
        cmd: podman generate systemd --name prometheus --files
        chdir: /etc/systemd/system
      changed_when: false

    - name: Enable and start Prometheus systemd service
      ansible.builtin.systemd:
        name: container-prometheus
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Reload Prometheus config
      ansible.builtin.command:
        cmd: podman kill --signal HUP prometheus
      changed_when: false
      failed_when: false

    # --- Grafana provisioning files ---

    - name: Create Grafana provisioning directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /etc/grafana/provisioning/datasources
        - /etc/grafana/provisioning/dashboards
        - /etc/grafana/dashboards

    - name: Write Grafana Prometheus datasource
      ansible.builtin.copy:
        dest: /etc/grafana/provisioning/datasources/prometheus.yml
        mode: "0644"
        content: |
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://localhost:9090
              isDefault: true
      notify: restart grafana

    - name: Write Grafana Loki datasource
      ansible.builtin.copy:
        dest: /etc/grafana/provisioning/datasources/loki.yml
        mode: "0644"
        content: |
          apiVersion: 1
          datasources:
            - name: Loki
              type: loki
              uid: loki
              access: proxy
              url: http://localhost:3100
              isDefault: false
      notify: restart grafana

    - name: Write Grafana dashboard provisioning config
      ansible.builtin.copy:
        dest: /etc/grafana/provisioning/dashboards/default.yml
        mode: "0644"
        content: |
          apiVersion: 1
          providers:
            - name: default
              type: file
              options:
                path: /etc/grafana/dashboards

    - name: Write node exporter dashboard
      ansible.builtin.copy:
        dest: /etc/grafana/dashboards/node-exporter.json
        mode: "0644"
        content: !unsafe |
          {
            "title": "App Instance Metrics",
            "uid": "node-exporter",
            "schemaVersion": 36,
            "panels": [
              {
                "type": "timeseries",
                "title": "CPU Usage (%)",
                "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
                "targets": [
                  {
                    "expr": "100 - (avg by(instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[2m])) * 100)",
                    "legendFormat": "{{instance}}"
                  }
                ]
              },
              {
                "type": "timeseries",
                "title": "Memory Usage (%)",
                "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
                "targets": [
                  {
                    "expr": "100 - ((node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100)",
                    "legendFormat": "{{instance}}"
                  }
                ]
              }
            ],
            "time": { "from": "now-1h", "to": "now" },
            "refresh": "30s"
          }

    - name: Write Falco security alerts dashboard
      ansible.builtin.copy:
        dest: /etc/grafana/dashboards/falco.json
        mode: "0644"
        content: !unsafe |
          {
            "title": "Falco Security Alerts",
            "uid": "falco-alerts",
            "schemaVersion": 36,
            "panels": [
              {
                "type": "timeseries",
                "title": "Security Alerts by Priority",
                "gridPos": { "x": 0, "y": 0, "w": 24, "h": 8 },
                "targets": [
                  {
                    "expr": "rate(falco_events_total[5m])",
                    "legendFormat": "{{priority}} - {{rule}}"
                  }
                ]
              },
              {
                "type": "stat",
                "title": "Total Alerts (last 1h)",
                "gridPos": { "x": 0, "y": 8, "w": 8, "h": 4 },
                "targets": [
                  {
                    "expr": "increase(falco_events_total[1h])"
                  }
                ]
              }
            ],
            "time": { "from": "now-1h", "to": "now" },
            "refresh": "30s"
          }

    - name: Write WAF dashboard
      ansible.builtin.copy:
        dest: /etc/grafana/dashboards/waf-modsecurity.json
        mode: "0644"
        content: !unsafe |
          {
            "title": "WAF - ModSecurity Detections",
            "uid": "waf-modsecurity",
            "schemaVersion": 36,
            "panels": [
              {
                "type": "logs",
                "title": "Recent Detections",
                "gridPos": { "x": 0, "y": 0, "w": 24, "h": 10 },
                "datasource": { "type": "loki", "uid": "loki" },
                "targets": [
                  {
                    "expr": "{job=\"modsecurity\"} |~ \"ModSecurity: Warning\"",
                    "refId": "A"
                  }
                ],
                "options": {
                  "showLabels": true,
                  "showTime": true,
                  "wrapLogMessage": true
                }
              },
              {
                "type": "timeseries",
                "title": "Requests Exceeding Anomaly Threshold",
                "gridPos": { "x": 0, "y": 10, "w": 16, "h": 8 },
                "datasource": { "type": "loki", "uid": "loki" },
                "targets": [
                  {
                    "expr": "sum(count_over_time({job=\"modsecurity\"} |~ \"Anomaly Score Exceeded\"[5m]))",
                    "legendFormat": "detections",
                    "refId": "A"
                  }
                ]
              },
              {
                "type": "stat",
                "title": "Total Detections (last 1h)",
                "gridPos": { "x": 16, "y": 10, "w": 8, "h": 8 },
                "datasource": { "type": "loki", "uid": "loki" },
                "targets": [
                  {
                    "expr": "sum(count_over_time({job=\"modsecurity\"} |~ \"Anomaly Score Exceeded\"[1h]))",
                    "refId": "A"
                  }
                ]
              }
            ],
            "time": { "from": "now-6h", "to": "now" },
            "refresh": "30s"
          }
      notify: restart grafana

    # --- Grafana ---

    - name: Run Grafana container
      containers.podman.podman_container:
        name: grafana
        image: docker.io/grafana/grafana:latest
        state: started
        ports:
          - "3000:3000"
        volumes:
          - /etc/grafana/provisioning:/etc/grafana/provisioning:ro
          - /etc/grafana/dashboards:/etc/grafana/dashboards:ro
        env:
          GF_AUTH_ANONYMOUS_ENABLED: "false"
          GF_SERVER_HTTP_ADDR: "0.0.0.0"
        restart_policy: always

    - name: Generate Grafana systemd service
      ansible.builtin.command:
        cmd: podman generate systemd --name grafana --files
        chdir: /etc/systemd/system
      changed_when: false

    - name: Enable and start Grafana systemd service
      ansible.builtin.systemd:
        name: container-grafana
        enabled: yes
        state: started
        daemon_reload: yes

    # --- Loki ---

    - name: Create Loki config directory
      ansible.builtin.file:
        path: /etc/loki
        state: directory
        mode: "0755"

    - name: Write Loki config
      ansible.builtin.copy:
        dest: /etc/loki/loki-config.yml
        mode: "0644"
        content: |
          auth_enabled: false

          server:
            http_listen_port: 3100

          common:
            path_prefix: /loki
            storage:
              filesystem:
                chunks_directory: /loki/chunks
                rules_directory: /loki/rules
            replication_factor: 1
            ring:
              instance_addr: 127.0.0.1
              kvstore:
                store: inmemory

          schema_config:
            configs:
              - from: 2020-10-24
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h

          analytics:
            reporting_enabled: false

    - name: Run Loki container
      containers.podman.podman_container:
        name: loki
        image: docker.io/grafana/loki:2.9.10
        state: started
        ports:
          - "3100:3100"
        volumes:
          - /etc/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
          - loki-data:/loki
        command: -config.file=/etc/loki/loki-config.yml
        restart_policy: always

    - name: Generate Loki systemd service
      ansible.builtin.command:
        cmd: podman generate systemd --name loki --files
        chdir: /etc/systemd/system
      changed_when: false

    - name: Enable and start Loki systemd service
      ansible.builtin.systemd:
        name: container-loki
        enabled: yes
        state: started
        daemon_reload: yes
