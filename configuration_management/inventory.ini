[local]
localhost ansible_connection=local

# Fill APP_INSTANCE_PUBLIC_IP with: terraform output -raw instance_ip_address
# In CI this is injected automatically by the workflow via sed
[app]
APP_INSTANCE_PUBLIC_IP ansible_user=root ansible_ssh_private_key_file=~/.ssh/linode ansible_python_interpreter=/usr/bin/python3.12 ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# Monitoring instance is VPC-only — reached via ProxyJump through the app instance
# VPC IP is fixed at 10.0.0.3 (set in Terraform locals)
[monitoring]
10.0.0.3 ansible_user=root ansible_ssh_private_key_file=~/.ssh/linode ansible_python_interpreter=/usr/bin/python3.12 ansible_ssh_common_args='-o ProxyCommand="ssh -i ~/.ssh/linode -W %h:%p -o StrictHostKeyChecking=no root@APP_INSTANCE_PUBLIC_IP" -o StrictHostKeyChecking=no'

[monitoring:vars]
instance_vpc_ip=10.0.0.2
