# deploy.yml - Deploy myGuy application to a remote server

---
- name: Deploy myGuy application
  hosts: myhosts
  become: yes

  vars:
    app_dir: /opt/myguy
    repo_url: "{{ lookup('env', 'REPO_URL') }}"
    git_branch: main
    jwt_secret: "{{ lookup('env', 'JWT_SECRET') }}"
    db_password: "{{ lookup('env', 'DB_PASSWORD') }}"
    internal_api_key: "{{ lookup('env', 'INTERNAL_API_KEY') }}"

  tasks:
    # --- System Dependencies ---

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - git
          - curl
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present

    - name: Install Docker Engine and Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: yes

    # --- Application Setup ---

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Clone or update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ git_branch }}"
        force: yes
      become_user: "{{ ansible_user }}"

    # --- Environment Configuration ---

    - name: Write .env file
      copy:
        dest: "{{ app_dir }}/.env"
        mode: "0600"
        owner: "{{ ansible_user }}"
        content: |
          JWT_SECRET={{ jwt_secret }}
          DB_PASSWORD={{ db_password }}
          INTERNAL_API_KEY={{ internal_api_key }}

    # --- Deploy ---

    - name: Pull latest Docker images
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        pull: always
        state: present
      environment:
        JWT_SECRET: "{{ jwt_secret }}"
        DB_PASSWORD: "{{ db_password }}"
        INTERNAL_API_KEY: "{{ internal_api_key }}"

    - name: Start application stack
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: present
        recreate: auto
      environment:
        JWT_SECRET: "{{ jwt_secret }}"
        DB_PASSWORD: "{{ db_password }}"
        INTERNAL_API_KEY: "{{ internal_api_key }}"

    # --- Health Check ---

    - name: Wait for backend API to be healthy
      uri:
        url: "http://localhost:8080/api/v1/health"
        status_code: 200
      register: health_check
      retries: 10
      delay: 6
      until: health_check.status == 200
      ignore_errors: yes

    - name: Report deployment status
      debug:
        msg: >
          Deployment complete.
          API: http://{{ ansible_host }}:8080
          Store: http://{{ ansible_host }}:8081
          Chat: http://{{ ansible_host }}:8082
