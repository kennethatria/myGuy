# deploy.yml - Deploy myGuy application to a remote server

---
- name: Deploy myGuy application
  hosts: "{{ target | default('app') }}"
  become: yes

  vars:
    app_dir: /opt/myguy
    git_branch: main
    zipkin_url: "{{ hostvars[groups['monitoring'][0]]['zipkin_url'] | default('http://10.0.0.3:9411/api/v2/spans') }}"
    images_to_verify:
      - "{{ registry }}/myguy-api:{{ image_tag }}"
      - "{{ registry }}/myguy-store-service:{{ image_tag }}"
      - "{{ registry }}/myguy-chat-websocket-service:{{ image_tag }}"

  tasks:
    # --- Application Setup ---

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Clone or update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ git_branch }}"
        force: yes
      become_user: "{{ ansible_user }}"

    # --- Environment Configuration ---

    - name: Write .env file
      copy:
        dest: "{{ app_dir }}/.env"
        mode: "0600"
        owner: "{{ ansible_user }}"
        content: |
          JWT_SECRET={{ jwt_secret }}
          DB_PASSWORD={{ db_password }}
          INTERNAL_API_KEY={{ internal_api_key }}
          ZIPKIN_URL={{ zipkin_url }}

    # --- Deploy ---

    - name: Pull images from Docker Hub
      command: podman compose pull
      args:
        chdir: "{{ app_dir }}"
      environment:
        JWT_SECRET: "{{ jwt_secret }}"
        DB_PASSWORD: "{{ db_password }}"
        INTERNAL_API_KEY: "{{ internal_api_key }}"

    - name: Get image digests
      command: podman image inspect --format {% raw %}"{{.Digest}}"{% endraw %} {{ item }}
      loop: "{{ images_to_verify }}"
      register: image_digests
      changed_when: false

    - name: Verify image signatures with cosign
      command: >
        cosign verify
        --certificate-identity-regexp "https://github.com/{{ github_repository }}/.github/workflows/.*"
        --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
        {{ item.item | regex_replace(':.*$', '') }}@{{ item.stdout }}
      loop: "{{ image_digests.results }}"
      changed_when: false

    - name: Start application stack
      command: podman compose up -d --force-recreate
      args:
        chdir: "{{ app_dir }}"
      environment:
        JWT_SECRET: "{{ jwt_secret }}"
        DB_PASSWORD: "{{ db_password }}"
        INTERNAL_API_KEY: "{{ internal_api_key }}"

    # --- Frontend Build ---

    - name: Write frontend .env
      copy:
        dest: "{{ app_dir }}/frontend/.env"
        mode: "0644"
        content: |
          VITE_API_URL=https://{{ domain }}/api/v1
          VITE_STORE_API_URL=https://{{ domain }}/store/api/v1
          VITE_STORE_API_BASE_URL=https://{{ domain }}/store
          VITE_CHAT_WS_URL=https://{{ domain }}
          VITE_CHAT_API_URL=https://{{ domain }}/chat/api/v1

    - name: Install frontend dependencies
      command: npm install
      args:
        chdir: "{{ app_dir }}/frontend"

    - name: Build frontend
      command: npm run build
      args:
        chdir: "{{ app_dir }}/frontend"

    # --- Nginx + TLS ---

    - name: Check if TLS certificate exists
      ansible.builtin.stat:
        path: /etc/letsencrypt/live/{{ domain }}/fullchain.pem
      register: cert_stat

    - name: Write nginx HTTP config (pre-certbot)
      copy:
        dest: /etc/nginx/sites-available/myguy
        content: |
          server {
              listen 80;
              server_name {{ domain }} www.{{ domain }};

              root {{ app_dir }}/frontend/dist;
              index index.html;

              location /healthcheck/ {
                  return 200 "healthcheck";
                  add_header Content-Type text/plain;
              }

              location /health {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              location /api/v1 {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              location /store/ {
                  rewrite ^/store/(.*)$ /$1 break;
                  proxy_pass http://127.0.0.1:8081;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              location /chat/ {
                  rewrite ^/chat/(.*)$ /$1 break;
                  proxy_pass http://127.0.0.1:8082;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              location /socket.io {
                  proxy_pass http://127.0.0.1:8082;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
              }

              location / {
                  try_files $uri $uri/ /index.html;
              }
          }
      when: not cert_stat.stat.exists

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/myguy
        dest: /etc/nginx/sites-enabled/myguy
        state: link

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
        enabled: yes

    - name: Obtain TLS certificate
      ansible.builtin.command:
        cmd: >
          certbot certonly --nginx
          -d {{ domain }} -d www.{{ domain }}
          --non-interactive --agree-tos
          -m {{ certbot_email }}
        creates: /etc/letsencrypt/live/{{ domain }}/fullchain.pem

    - name: Write nginx HTTPS config
      copy:
        dest: /etc/nginx/sites-available/myguy
        content: |
          server {
              listen 80;
              server_name {{ domain }} www.{{ domain }};
              return 301 https://$host$request_uri;
          }

          server {
              listen 443 ssl;
              server_name {{ domain }} www.{{ domain }};

              ssl_certificate /etc/letsencrypt/live/{{ domain }}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/{{ domain }}/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_ciphers HIGH:!aNULL:!MD5;

              modsecurity on;
              modsecurity_rules_file /etc/nginx/modsecurity/coraza.conf;

              root {{ app_dir }}/frontend/dist;
              index index.html;

              location /healthcheck/ {
                  return 200 "healthcheck";
                  add_header Content-Type text/plain;
              }

              location /health {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              location /api/v1 {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              location /store/ {
                  rewrite ^/store/(.*)$ /$1 break;
                  proxy_pass http://127.0.0.1:8081;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              location /chat/ {
                  rewrite ^/chat/(.*)$ /$1 break;
                  proxy_pass http://127.0.0.1:8082;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              location /socket.io {
                  proxy_pass http://127.0.0.1:8082;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
              }

              location / {
                  try_files $uri $uri/ /index.html;
              }
          }

    - name: Reload nginx with HTTPS config
      service:
        name: nginx
        state: reloaded

    # --- Health Check ---

    - name: Show container status
      command: podman ps -a
      args:
        chdir: "{{ app_dir }}"
      register: container_status
      changed_when: false

    - name: Print container status
      debug:
        var: container_status.stdout_lines

    - name: Wait for backend API to be healthy
      uri:
        url: "http://localhost:8080/health"
        status_code: 200
      register: health_check
      retries: 10
      delay: 6
      until: health_check.status == 200

    - name: Report deployment status
      debug:
        msg: >
          Deployment complete.
          API: http://{{ ansible_host }}:8080
          Store: http://{{ ansible_host }}:8081
          Chat: http://{{ ansible_host }}:8082
