# deploy.yml - Deploy myGuy application to a remote server

---
- name: Deploy myGuy application
  hosts: "{{ target | default('app') }}"
  become: yes

  handlers:
    - name: reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

  vars:
    app_dir: /opt/myguy
    git_branch: main
    zipkin_url: "{{ hostvars[groups['monitoring'][0]]['zipkin_url'] | default('http://10.0.0.3:9411/api/v2/spans') }}"
    images_to_verify:
      - "{{ registry }}/myguy-api:{{ image_tag }}"
      - "{{ registry }}/myguy-store-service:{{ image_tag }}"
      - "{{ registry }}/myguy-chat-websocket-service:{{ image_tag }}"

  tasks:
    # --- Application Setup ---

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Clone or update repository
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ git_branch }}"
        force: yes
      become_user: "{{ ansible_user }}"

    # --- Environment Configuration ---

    - name: Write .env file
      ansible.builtin.copy:
        dest: "{{ app_dir }}/.env"
        mode: "0600"
        owner: "{{ ansible_user }}"
        content: |
          JWT_SECRET={{ jwt_secret }}
          DB_PASSWORD={{ db_password }}
          INTERNAL_API_KEY={{ internal_api_key }}
          ZIPKIN_URL={{ zipkin_url }}

    # --- Deploy ---

    - name: Pull images from Docker Hub
      ansible.builtin.command:
        cmd: podman compose pull
        chdir: "{{ app_dir }}"
      environment:
        JWT_SECRET: "{{ jwt_secret }}"
        DB_PASSWORD: "{{ db_password }}"
        INTERNAL_API_KEY: "{{ internal_api_key }}"

    - name: Get image digests
      ansible.builtin.command:
        cmd: podman image inspect --format {% raw %}"{{.Digest}}"{% endraw %} {{ item }}
      loop: "{{ images_to_verify }}"
      register: image_digests
      changed_when: false

    - name: Verify image signatures with cosign
      ansible.builtin.command:
        cmd: >
          cosign verify
          --certificate-identity-regexp "https://github.com/{{ github_repository }}/.github/workflows/.*"
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          {{ item.item | regex_replace(':.*$', '') }}@{{ item.stdout }}
      loop: "{{ image_digests.results }}"
      changed_when: false

    - name: Start application stack
      ansible.builtin.command:
        cmd: podman compose up -d --force-recreate
        chdir: "{{ app_dir }}"
      environment:
        JWT_SECRET: "{{ jwt_secret }}"
        DB_PASSWORD: "{{ db_password }}"
        INTERNAL_API_KEY: "{{ internal_api_key }}"

    # --- Nginx + TLS ---

    - name: Check if TLS certificate exists
      ansible.builtin.stat:
        path: /etc/letsencrypt/live/{{ domain }}/fullchain.pem
      register: cert_stat

    - name: Write nginx HTTP config (pre-certbot)
      ansible.builtin.template:
        src: nginx-http.conf.j2
        dest: /etc/nginx/sites-available/myguy
        mode: "0644"
      when: not cert_stat.stat.exists
      notify: reload nginx

    - name: Enable nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/myguy
        dest: /etc/nginx/sites-enabled/myguy
        state: link
      notify: reload nginx

    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: reload nginx

    - name: Flush handlers to reload nginx before certbot
      ansible.builtin.meta: flush_handlers

    - name: Obtain TLS certificate
      ansible.builtin.command:
        cmd: >
          certbot certonly --nginx
          -d {{ domain }} -d www.{{ domain }}
          --non-interactive --agree-tos
          -m {{ certbot_email }}
        creates: /etc/letsencrypt/live/{{ domain }}/fullchain.pem

    - name: Write nginx HTTPS config
      ansible.builtin.template:
        src: nginx-https.conf.j2
        dest: /etc/nginx/sites-available/myguy
        mode: "0644"
      notify: reload nginx

    # --- Health Check ---

    - name: Show container status
      ansible.builtin.command:
        cmd: podman ps -a
        chdir: "{{ app_dir }}"
      register: container_status
      changed_when: false

    - name: Print container status
      ansible.builtin.debug:
        var: container_status.stdout_lines

    - name: Wait for backend API to be healthy
      ansible.builtin.uri:
        url: "http://localhost:8080/health"
        status_code: 200
      register: health_check
      retries: 10
      delay: 6
      until: health_check.status == 200

    - name: Report deployment status
      ansible.builtin.debug:
        msg: >
          Deployment complete.
          https://{{ domain }}
