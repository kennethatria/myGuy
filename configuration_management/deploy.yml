# deploy.yml - Deploy myGuy application to a remote server

---
- name: Deploy myGuy application
  hosts: "{{ target | default('myhosts') }}"
  become: yes

  vars:
    app_dir: /opt/myguy
    repo_url: "{{ lookup('env', 'REPO_URL') }}"
    git_branch: main
    jwt_secret: "{{ lookup('env', 'JWT_SECRET') }}"
    db_password: "{{ lookup('env', 'DB_PASSWORD') }}"
    internal_api_key: "{{ lookup('env', 'INTERNAL_API_KEY') }}"
    server_ip: "{{ ansible_host }}"

  tasks:
    # --- Application Setup ---

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Clone or update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ git_branch }}"
        force: yes
      become_user: "{{ ansible_user }}"

    # --- Environment Configuration ---

    - name: Write .env file
      copy:
        dest: "{{ app_dir }}/.env"
        mode: "0600"
        owner: "{{ ansible_user }}"
        content: |
          JWT_SECRET={{ jwt_secret }}
          DB_PASSWORD={{ db_password }}
          INTERNAL_API_KEY={{ internal_api_key }}

    # --- Deploy ---

    - name: Pull images from Docker Hub
      command: podman compose pull
      args:
        chdir: "{{ app_dir }}"
      environment:
        JWT_SECRET: "{{ jwt_secret }}"
        DB_PASSWORD: "{{ db_password }}"
        INTERNAL_API_KEY: "{{ internal_api_key }}"

    - name: Start application stack
      command: podman compose up -d --force-recreate
      args:
        chdir: "{{ app_dir }}"
      environment:
        JWT_SECRET: "{{ jwt_secret }}"
        DB_PASSWORD: "{{ db_password }}"
        INTERNAL_API_KEY: "{{ internal_api_key }}"

    # --- Frontend Build ---

    - name: Write frontend .env
      copy:
        dest: "{{ app_dir }}/frontend/.env"
        mode: "0644"
        content: |
          VITE_API_URL=http://{{ server_ip }}/api/v1
          VITE_STORE_API_URL=http://{{ server_ip }}/store/api/v1
          VITE_STORE_API_BASE_URL=http://{{ server_ip }}/store
          VITE_CHAT_WS_URL=http://{{ server_ip }}
          VITE_CHAT_API_URL=http://{{ server_ip }}/chat/api/v1

    - name: Install frontend dependencies
      command: npm install
      args:
        chdir: "{{ app_dir }}/frontend"

    - name: Build frontend
      command: npm run build
      args:
        chdir: "{{ app_dir }}/frontend"

    # --- Nginx ---

    - name: Write nginx config
      copy:
        dest: /etc/nginx/sites-available/myguy
        content: |
          server {
              listen 80;

              # Frontend static files
              root {{ app_dir }}/frontend/dist;
              index index.html;

              # Main backend API
              location /health {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              location /api/v1 {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              # Store service (strip /store prefix)
              location /store/ {
                  rewrite ^/store/(.*)$ /$1 break;
                  proxy_pass http://127.0.0.1:8081;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              # Chat HTTP API (strip /chat prefix)
              location /chat/ {
                  rewrite ^/chat/(.*)$ /$1 break;
                  proxy_pass http://127.0.0.1:8082;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              # Chat WebSocket
              location /socket.io {
                  proxy_pass http://127.0.0.1:8082;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
              }

              # Frontend SPA - serve index.html for all unmatched routes
              location / {
                  try_files $uri $uri/ /index.html;
              }
          }

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/myguy
        dest: /etc/nginx/sites-enabled/myguy
        state: link

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
        enabled: yes

    # --- Health Check ---

    - name: Wait for backend API to be healthy
      uri:
        url: "http://localhost:8080/health"
        status_code: 200
      register: health_check
      retries: 10
      delay: 6
      until: health_check.status == 200

    - name: Report deployment status
      debug:
        msg: >
          Deployment complete.
          API: http://{{ ansible_host }}:8080
          Store: http://{{ ansible_host }}:8081
          Chat: http://{{ ansible_host }}:8082
