# deploy.yml - Deploy myGuy application to a remote server

---
- name: Deploy myGuy application
  hosts: "{{ target | default('myhosts') }}"
  become: yes

  vars:
    app_dir: /opt/myguy
    repo_url: "{{ lookup('env', 'REPO_URL') }}"
    git_branch: main
    jwt_secret: "{{ lookup('env', 'JWT_SECRET') }}"
    db_password: "{{ lookup('env', 'DB_PASSWORD') }}"
    internal_api_key: "{{ lookup('env', 'INTERNAL_API_KEY') }}"

  tasks:
    # --- Application Setup ---

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Clone or update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ git_branch }}"
        force: yes
      become_user: "{{ ansible_user }}"

    # --- Environment Configuration ---

    - name: Write .env file
      copy:
        dest: "{{ app_dir }}/.env"
        mode: "0600"
        owner: "{{ ansible_user }}"
        content: |
          JWT_SECRET={{ jwt_secret }}
          DB_PASSWORD={{ db_password }}
          INTERNAL_API_KEY={{ internal_api_key }}

    # --- Deploy ---

    - name: Pull images from Docker Hub
      command: podman compose pull
      args:
        chdir: "{{ app_dir }}"
      environment:
        JWT_SECRET: "{{ jwt_secret }}"
        DB_PASSWORD: "{{ db_password }}"
        INTERNAL_API_KEY: "{{ internal_api_key }}"

    - name: Start application stack
      command: podman compose up -d --force-recreate
      args:
        chdir: "{{ app_dir }}"
      environment:
        JWT_SECRET: "{{ jwt_secret }}"
        DB_PASSWORD: "{{ db_password }}"
        INTERNAL_API_KEY: "{{ internal_api_key }}"

    # --- Health Check ---

    - name: Wait for backend API to be healthy
      uri:
        url: "http://localhost:8080/health"
        status_code: 200
      register: health_check
      retries: 10
      delay: 6
      until: health_check.status == 200

    - name: Report deployment status
      debug:
        msg: >
          Deployment complete.
          API: http://{{ ansible_host }}:8080
          Store: http://{{ ansible_host }}:8081
          Chat: http://{{ ansible_host }}:8082
