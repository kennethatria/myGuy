<!DOCTYPE html>
<html>
<head>
    <title>MyGuy Logo</title>
    <style>
        .logo-text {
            font-family: Arial, sans-serif;
            font-size: 32px;
            font-weight: bold;
            color: #1F2937;
            margin-left: 10px;
        }
        .logo-container {
            display: flex;
            align-items: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <svg width="40px" height="40px" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(2, 2)">
                <circle cx="18" cy="10" r="8" fill="#4F46E5" />
                <path d="M8,36 C8,25 28,25 28,36" stroke="#4F46E5" stroke-width="4" fill="none" />
            </g>
        </svg>
        <span class="logo-text">MyGuy</span>
    </div>
</body>
</html>
