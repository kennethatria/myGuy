name: Build and push images to registry

on:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'backend/**'
  #     - 'store-service/**'
  #     - 'chat-websocket-service/**'
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ${{ vars.REGISTRY }}

jobs:
  get-tag:
    name: Get Image Tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.get_release.outputs.image_tag }}
    steps:
      - name: Get latest release tag
        id: get_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if LATEST_TAG=$(gh release view --repo ${{ github.repository }} --json tagName --jq '.tagName' 2>/dev/null); then
            echo "Found latest release: $LATEST_TAG"
            echo "image_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "No releases found, using 'latest'"
            echo "image_tag=latest" >> $GITHUB_OUTPUT
          fi

  build-push-api:
    needs: get-tag
    name: API Service
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/myguy-api:${{ needs.get-tag.outputs.image_tag }}

      - name: Sign image with Cosign
        run: cosign sign --yes ${{ env.REGISTRY }}/myguy-api@${{ steps.build.outputs.digest }}

      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/myguy-api@${{ steps.build.outputs.digest }}

  build-push-store-service:
    needs: [get-tag, build-push-api]
    name: Store Service
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./store-service
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/myguy-store-service:${{ needs.get-tag.outputs.image_tag }}

      - name: Sign image with Cosign
        run: cosign sign --yes ${{ env.REGISTRY }}/myguy-store-service@${{ steps.build.outputs.digest }}

      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/myguy-store-service@${{ steps.build.outputs.digest }}

  build-push-chat-service:
    needs: [get-tag, build-push-store-service]
    name: Chat Websocket Service
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./chat-websocket-service
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/myguy-chat-websocket-service:${{ needs.get-tag.outputs.image_tag }}

      - name: Sign image with Cosign
        run: cosign sign --yes ${{ env.REGISTRY }}/myguy-chat-websocket-service@${{ steps.build.outputs.digest }}

      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/myguy-chat-websocket-service@${{ steps.build.outputs.digest }}
