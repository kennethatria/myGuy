---
name: Continous integration & deployment pipeline
run-name: Continous integration & deployment pipeline - ${{ github.event_name }} - ${{ github.ref }}
    
env:
  RELEASE_BRANCH: refs/heads/main
    
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
    
on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    
jobs:
  context:
    runs-on: ubuntu-latest
    outputs:
      isRelease: ${{ steps.is.outputs.release }}
      isPullRequest: ${{ steps.is.outputs.pr }}
    steps:
      - id: is
        name: set variables
        run: |
          {
            echo release=${{ github.ref == env.RELEASE_BRANCH && github.event_name == 'push' }}
            echo pr=${{ github.event_name == 'pull_request' }}
          } >> "$GITHUB_OUTPUT"
      - name: create summary
        run: |

              isRelease=$([[ "${{ steps.is.outputs.release }}" == "true" ]] && echo "✅" || echo "❌")
              isPullRequest=$([[ "${{ steps.is.outputs.pr }}" == "true" ]] && echo "✅" || echo "❌")
        
              table_header="| Variable | Value |"
              table_separator="|---|---|"
              table_row1="| isRelease | ${{ steps.is.outputs.release }} |"
              table_row2="| IsPullRequest | ${{ steps.is.outputs.pr }} |"
              table_row3="| github.event_name | ${{ github.event_name }} |"
              table_row4="| github.ref | ${{ github.ref }} |"
    
              # Write to GitHub Step Summary
              {
                echo "## Pull Request Summary"
                echo "$table_header"
                echo "$table_separator"
                echo "$table_row1"
                echo "$table_row2"
                echo "$table_row3"
                echo "$table_row4"
              } >> "$GITHUB_STEP_SUMMARY"
    
  standards:
    needs: [context]
    if: ${{ needs.context.outputs.isPullRequest == 'true' }}
    uses: ./.github/workflows/component.build.commit.lint.yml

  test-code-coverage:
    needs: [context, standards]
    if: ${{ needs.context.outputs.isPullRequest == 'true' }}
    uses: ./.github/workflows/component.build.test.code.coverage.yml
    secrets: inherit

  static-code-analysis:
    needs: [context]
    permissions:
      actions: read
      contents: read
      security-events: write
      attestations: read
    if: ${{ needs.context.outputs.isPullRequest == 'true' }}
    uses: ./.github/workflows/component.security.codeql.yml

  release:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    if: ${{ needs.context.outputs.isRelease == 'true' }}
    needs: [context]
    uses: ./.github/workflows/component.build.please.release.yml
    secrets: inherit

  generate-sbom:
    permissions:
      contents: write
    if: ${{ needs.context.outputs.isRelease == 'true' }}
    needs: [context]
    uses: ./.github/workflows/component.build.generate.sbom.yml
    secrets: inherit

  run-scorecard:
    permissions: 
      security-events: write
      id-token: write
      actions: read
      artifact-metadata: read
      attestations: read
      checks: read
      contents: read
      deployments: read
      discussions: read
      issues: read
      models: read
      packages: read
      pages: read
      pull-requests: read
      repository-projects: read
      statuses: read
    if: ${{ needs.context.outputs.isRelease == 'true' }}
    needs: [context]
    uses: ./.github/workflows/component.security.scorecard.yml
    secrets: inherit

  deploy-images-to-repository:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    if: ${{ needs.context.outputs.isRelease == 'true' }}
    needs: [context, release]
    uses: ./.github/workflows/component.build.push.to.registry.yml
    secrets: inherit

  deploy-infra:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    if: ${{ needs.context.outputs.isRelease == 'true' }}
    needs: [context, release]
    uses: ./.github/workflows/component.infra.tf.deploy.yml
    secrets: inherit

  run-ansible:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    if: ${{ needs.context.outputs.isRelease == 'true' }}
    needs: [context, release, deploy-images-to-repository, deploy-infra]
    uses: ./.github/workflows/component.infra.config.deploy.application.yml
    secrets: inherit