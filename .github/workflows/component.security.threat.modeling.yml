name: Run threat model analysis

on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: '0 0 1 * *'  # First day of every month

jobs:
  threat-model:
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create report directory
        run: mkdir -p report

      - name: Run Let's Threat Model
        env:
          PROVIDER_API_KEY: ${{ secrets.PROVIDER_API_KEY }}
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -v "$(pwd)":/data \
            -e PROVIDER_API_KEY="${PROVIDER_API_KEY}" \
            -e GITHUB_USERNAME="${GITHUB_USERNAME}" \
            -e GITHUB_PAT="${GITHUB_PAT}" \
            -e LOG_LEVEL=INFO \
            ghcr.io/owasp/lets-threat-model:latest \
            --config-file /data/.github/threat-model-config.yaml \
            --sarif-output /data/report/threat_model_report.sarif \
            --markdown-output /data/report/threat_model_report.md

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: threat-model-report
          path: report/
          retention-days: 90

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: report/threat_model_report.sarif
