name: Run ansible to deploy application

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: string

  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev

env:
  TF_VERSION: '1.14.6'
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
  REGISTRY: ${{ vars.REGISTRY }}

jobs:
  deploy:
    name: Run Ansible Deploy Playbook
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_version: ${{ env.TF_VERSION }}

      - name: Get server IP from Terraform output
        id: get_ip
        working-directory: infra
        run: |
          terraform init -input=false
          echo "SERVER_IP=$(terraform output -raw instance_ip_address)" >> $GITHUB_ENV

      - name: Inject server IP into inventory
        run: |
          sed -i "s/APP_INSTANCE_PUBLIC_IP/$SERVER_IP/g" configuration_management/inventory.ini

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://${{ vars.DOMAIN }}/api/v1
          VITE_STORE_API_URL: https://${{ vars.DOMAIN }}/store/api/v1
          VITE_STORE_API_BASE_URL: https://${{ vars.DOMAIN }}/store
          VITE_CHAT_WS_URL: https://${{ vars.DOMAIN }}
          VITE_CHAT_API_URL: https://${{ vars.DOMAIN }}/chat/api/v1

      - name: Install Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible rsync

      - name: Install Ansible collections
        run: ansible-galaxy collection install containers.podman

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Get image tag
        id: get_tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if LATEST_TAG=$(gh release view --repo ${{ github.repository }} --json tagName --jq '.tagName' 2>/dev/null); then
            echo "image_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "image_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Verify images are signed
        run: |
          for IMAGE in \
            ${{ env.REGISTRY }}/myguy-api:${{ steps.get_tag.outputs.image_tag }} \
            ${{ env.REGISTRY }}/myguy-store-service:${{ steps.get_tag.outputs.image_tag }} \
            ${{ env.REGISTRY }}/myguy-chat-websocket-service:${{ steps.get_tag.outputs.image_tag }}; do
            echo "Verifying $IMAGE..."
            cosign verify \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$IMAGE"
          done

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          # Write to ~/.ssh/linode to match the path hardcoded in inventory.ini
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/linode
          chmod 600 ~/.ssh/linode
          # Add app instance to known_hosts — monitoring is VPC-only and
          # is reached via ProxyJump through the app instance (handled in inventory)
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts

      - name: Configure monitoring instance
        run: |
          ansible-playbook \
            -i configuration_management/inventory.ini \
            configuration_management/monitoring.yml

      - name: Configure app instance base
        run: |
          ansible-playbook \
            -i configuration_management/inventory.ini \
            configuration_management/site.yml \
            -e "target=app"

      - name: Configure app instance security
        run: |
          ansible-playbook \
            -i configuration_management/inventory.ini \
            configuration_management/security.yml \
            -e "target=app"

      - name: Configure app instance observability
        run: |
          ansible-playbook \
            -i configuration_management/inventory.ini \
            configuration_management/observability.yml \
            -e "target=app"

      - name: Deploy application
        run: |
          ansible-playbook \
            -i configuration_management/inventory.ini \
            configuration_management/deploy.yml \
            -e "target=app" \
            -e "repo_url=${{ secrets.REPO_URL }}" \
            -e "jwt_secret=${{ secrets.JWT_SECRET }}" \
            -e "db_password=${{ secrets.POSTGRES_PASSWORD }}" \
            -e "internal_api_key=${{ secrets.INTERNAL_API_KEY }}" \
            -e "registry=${{ env.REGISTRY }}" \
            -e "image_tag=${{ steps.get_tag.outputs.image_tag }}" \
            -e "github_repository=${{ github.repository }}" \
            -e "domain=${{ vars.DOMAIN }}" \
            -e "certbot_email=${{ secrets.CERTBOT_EMAIL }}"

      - name: Upload frontend dist
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/linode -o StrictHostKeyChecking=no" \
            frontend/dist/ \
            root@$SERVER_IP:/opt/myguy/frontend/dist/

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/linode
