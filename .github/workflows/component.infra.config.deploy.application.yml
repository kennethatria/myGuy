name: Run ansible to deploy application

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: string

  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev

env:
  TF_VERSION: '1.14.6'
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

jobs:
  deploy:
    name: Run Ansible Deploy Playbook
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_version: ${{ env.TF_VERSION }}

      - name: Get server IP from Terraform output
        id: get_ip
        working-directory: infra
        run: |
          terraform init -input=false
          echo "SERVER_IP=$(terraform output -raw instance_ip_address)" >> $GITHUB_ENV

      - name: Inject server IP into inventory
        run: |
          sed -i "s/APP_INSTANCE_PUBLIC_IP/$SERVER_IP/g" configuration_management/inventory.ini

      - name: Install Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          # Write to ~/.ssh/linode to match the path hardcoded in inventory.ini
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/linode
          chmod 600 ~/.ssh/linode
          # Add app instance to known_hosts — monitoring is VPC-only and
          # is reached via ProxyJump through the app instance (handled in inventory)
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts

      # - name: Check Ansible connectivity
      #   run: |
      #     ansible-playbook \
      #       -i configuration_management/inventory.ini \
      #       configuration_management/site.yml \
      #       -e "target=app" \
      #       --check
      #   continue-on-error: true

      - name: Configure monitoring instance
        run: |
          ansible-playbook \
            -i configuration_management/inventory.ini \
            configuration_management/monitoring.yml

      - name: Configure app instance
        run: |
          ansible-playbook \
            -i configuration_management/inventory.ini \
            configuration_management/site.yml \
            -e "target=app"

      - name: Deploy application
        run: |
          ansible-playbook \
            -i configuration_management/inventory.ini \
            configuration_management/deploy.yml \
            -e "target=app" \
            -e "repo_url=${{ secrets.REPO_URL }}" \
            -e "jwt_secret=${{ secrets.JWT_SECRET }}" \
            -e "db_password=${{ secrets.POSTGRES_PASSWORD }}" \
            -e "internal_api_key=${{ secrets.INTERNAL_API_KEY }}"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/linode
