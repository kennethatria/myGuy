name: Deploy Application

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - cae
          - prd

jobs:
  deploy:
    name: Run Ansible Deploy Playbook
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Update inventory with server IP
        run: |
          sed -i "s/; xxx.xxx.xxx.1.*/\${{ secrets.SERVER_IP }} ansible_user=${{ secrets.SERVER_USER }} ansible_ssh_private_key_file=~\/.ssh\/id_rsa/" \
            configuration_management/inventory.ini

      - name: Run site playbook (install dependencies)
        run: |
          ansible-playbook \
            -i configuration_management/inventory.ini \
            configuration_management/site.yml \
            -e "target=myhosts"

      - name: Run deploy playbook
        env:
          REPO_URL: ${{ secrets.REPO_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          ansible-playbook \
            -i configuration_management/inventory.ini \
            configuration_management/deploy.yml

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
