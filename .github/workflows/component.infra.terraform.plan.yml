name: 'Terraform Plan'

on:
  workflow_call:
  # pull_request:
  #   branches: [ main ]
  #   paths:
  #     - 'infra/**'
  #     - '.github/workflows/terraform-plan.yml'

env:
  TF_VERSION: '1.6.0'

jobs:
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        environment: [staging, production]
    
    defaults:
      run:
        working-directory: infra

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Configure Terraform Backend
      run: |
        cat > backend.tf << EOF
        terraform {
          backend "s3" {
            bucket   = "myguy-terraform-state"
            key      = "${{ matrix.environment }}/terraform.tfstate"
            region   = "us-east-1"
            endpoint = "https://us-east-1.linodeobjects.com"
            
            skip_credentials_validation = true
            skip_region_validation     = true
            skip_metadata_api_check    = true
          }
        }
        EOF

    - name: Terraform Init
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJECT_STORAGE_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJECT_STORAGE_SECRET_KEY }}
      run: terraform init

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      env:
        TF_VAR_linode_token: ${{ secrets.LINODE_TOKEN }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
        TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
        TF_VAR_github_token: ${{ secrets.GITHUB_TOKEN }}
        TF_VAR_environment: ${{ matrix.environment }}
        AWS_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJECT_STORAGE_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJECT_STORAGE_SECRET_KEY }}
      run: |
        terraform plan \
          -var-file="environments/${{ matrix.environment }}/terraform.tfvars" \
          -out="${{ matrix.environment }}.tfplan"

    - name: Upload Plan
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan-${{ matrix.environment }}
        path: infra/${{ matrix.environment }}.tfplan
        retention-days: 5

    - name: Comment PR
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const { execSync } = require('child_process');
          
          try {
            const plan = execSync('cd infra && terraform show -no-color ${{ matrix.environment }}.tfplan', { encoding: 'utf-8' });
            const truncatedPlan = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan (${{ matrix.environment }})
              
              <details>
              <summary>Show Plan</summary>
              
              \`\`\`
              ${truncatedPlan}
              \`\`\`
              </details>`
            });
          } catch (error) {
            console.error('Error reading plan:', error);
          }