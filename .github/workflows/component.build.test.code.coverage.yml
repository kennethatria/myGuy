name: Tests

on:
  workflow_call:

jobs:
  backend-tests:
    name: Backend Tests (Go)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        working-directory: ./backend
        run: go mod download

      - name: Run tests with coverage
        working-directory: ./backend
        run: |
          go test ./internal/... -v -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out

      - name: Check coverage threshold
        working-directory: ./backend
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${COVERAGE}%"

          # Check if coverage is above 70%
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi

          echo "::notice::Coverage ${COVERAGE}% meets the 70% threshold"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

  store-service-tests:
    name: Store Service Tests (Go)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: store-service/go.sum

      - name: Download dependencies
        working-directory: ./store-service
        run: go mod download

      - name: Run tests with coverage
        working-directory: ./store-service
        run: |
          go test ./internal/... -v -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out

      - name: Check coverage threshold
        working-directory: ./store-service
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${COVERAGE}%"

          # Check if coverage is above 70% (store-service threshold)
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi

          echo "::notice::Coverage ${COVERAGE}% meets the 70% threshold"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: store-service-coverage
          path: store-service/coverage.out
          retention-days: 7

  chat-service-tests:
    name: Chat Service Tests (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chat-websocket-service/package-lock.json

      - name: Install dependencies
        working-directory: ./chat-websocket-service
        run: npm ci

      - name: Run linter
        working-directory: ./chat-websocket-service
        run: npm run lint --if-present

      - name: Run tests
        working-directory: ./chat-websocket-service
        run: npm test --if-present
        env:
          NODE_ENV: test

  frontend-tests:
    name: Frontend Tests (Vue/TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run type check
        working-directory: ./frontend
        run: npm run type-check --if-present

      - name: Run linter
        working-directory: ./frontend
        run: npm run lint --if-present

      - name: Run unit tests
        working-directory: ./frontend
        run: npm run test:unit --if-present
        env:
          NODE_ENV: test

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, store-service-tests, chat-service-tests, frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Backend
        working-directory: ./backend
        run: go build -o backend ./cmd/api/main.go

      - name: Build Store Service
        working-directory: ./store-service
        run: go build -o store-service ./cmd/api/main.go

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: All builds successful
        run: echo "All services built successfully!"
