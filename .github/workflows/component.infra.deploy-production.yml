name: 'Deploy to Production'

on:
  workflow_call:

env:
  TF_VERSION: '1.6.0'
  ENVIRONMENT: 'production'

jobs:
  # Destroy staging environment first
  destroy-staging:
    name: 'Destroy Staging Environment'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    defaults:
      run:
        working-directory: infra

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false

    - name: Configure Terraform Backend for Staging
      run: |
        cat > backend.tf << EOF
        terraform {
          backend "s3" {
            bucket   = "myguy-terraform-state"
            key      = "staging/terraform.tfstate"
            region   = "us-east-1"
            endpoint = "https://us-east-1.linodeobjects.com"
            
            skip_credentials_validation = true
            skip_region_validation     = true
            skip_metadata_api_check    = true
          }
        }
        EOF

    - name: Terraform Init (Staging)
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJECT_STORAGE_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJECT_STORAGE_SECRET_KEY }}
      run: terraform init

    - name: Check if Staging Exists
      id: staging-check
      env:
        TF_VAR_linode_token: ${{ secrets.LINODE_TOKEN }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
        TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
        TF_VAR_github_token: ${{ secrets.GITHUB_TOKEN }}
        TF_VAR_environment: 'staging'
        AWS_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJECT_STORAGE_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJECT_STORAGE_SECRET_KEY }}
      run: |
        if terraform plan -var-file="environments/staging/terraform.tfvars" -detailed-exitcode; then
          echo "staging_exists=false" >> $GITHUB_OUTPUT
        else
          echo "staging_exists=true" >> $GITHUB_OUTPUT
        fi
      continue-on-error: true

    - name: Destroy Staging Infrastructure
      if: steps.staging-check.outputs.staging_exists == 'true'
      env:
        TF_VAR_linode_token: ${{ secrets.LINODE_TOKEN }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
        TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
        TF_VAR_github_token: ${{ secrets.GITHUB_TOKEN }}
        TF_VAR_environment: 'staging'
        AWS_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJECT_STORAGE_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJECT_STORAGE_SECRET_KEY }}
      run: |
        echo "🗑️ Destroying staging environment to save costs..."
        terraform destroy -auto-approve \
          -var-file="environments/staging/terraform.tfvars"
        echo "✅ Staging environment destroyed"

    - name: Log Staging Destruction
      if: steps.staging-check.outputs.staging_exists == 'true'
      run: |
        echo "💰 Cost Savings: Staging environment destroyed"
        echo "📊 Monthly savings: ~€7/month while production is active"

  # Deploy infrastructure if needed
  terraform-deploy:
    name: 'Deploy Infrastructure'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    needs: [destroy-staging]
    if: always() && (github.event.inputs.deploy_infrastructure == 'true' || contains(github.event.head_commit.modified, 'infra/'))
    
    defaults:
      run:
        working-directory: infra

    outputs:
      app_instance_ip: ${{ steps.terraform-output.outputs.app_instance_ip }}
      application_url: ${{ steps.terraform-output.outputs.application_url }}
      load_balancer_ip: ${{ steps.terraform-output.outputs.load_balancer_ip }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false

    - name: Configure Terraform Backend
      run: |
        cat > backend.tf << EOF
        terraform {
          backend "s3" {
            bucket   = "myguy-terraform-state"
            key      = "${{ env.ENVIRONMENT }}/terraform.tfstate"
            region   = "us-east-1"
            endpoint = "https://us-east-1.linodeobjects.com"
            
            skip_credentials_validation = true
            skip_region_validation     = true
            skip_metadata_api_check    = true
          }
        }
        EOF

    - name: Terraform Init
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJECT_STORAGE_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJECT_STORAGE_SECRET_KEY }}
      run: terraform init

    - name: Terraform Apply
      env:
        TF_VAR_linode_token: ${{ secrets.LINODE_TOKEN }}
        TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET_PRODUCTION }}
        TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD_PRODUCTION }}
        TF_VAR_github_token: ${{ secrets.GITHUB_TOKEN }}
        TF_VAR_environment: ${{ env.ENVIRONMENT }}
        TF_VAR_ssl_cert: ${{ secrets.SSL_CERT }}
        TF_VAR_ssl_key: ${{ secrets.SSL_KEY }}
        AWS_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJECT_STORAGE_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJECT_STORAGE_SECRET_KEY }}
      run: |
        terraform apply -auto-approve \
          -var-file="environments/${{ env.ENVIRONMENT }}/terraform.tfvars"

    - name: Get Terraform Outputs
      id: terraform-output
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJECT_STORAGE_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJECT_STORAGE_SECRET_KEY }}
      run: |
        echo "app_instance_ip=$(terraform output -raw app_instance_ip)" >> $GITHUB_OUTPUT
        echo "application_url=$(terraform output -raw application_url)" >> $GITHUB_OUTPUT
        echo "load_balancer_ip=$(terraform output -raw load_balancer_ip)" >> $GITHUB_OUTPUT

  # Deploy application
  deploy-application:
    name: 'Deploy Application'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    needs: [destroy-staging, terraform-deploy]
    if: always() && (needs.terraform-deploy.result == 'success' || needs.terraform-deploy.result == 'skipped')
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get Infrastructure Info
      id: infrastructure
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJECT_STORAGE_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJECT_STORAGE_SECRET_KEY }}
      run: |
        # Get outputs from Terraform if infrastructure was deployed
        if [ "${{ needs.terraform-deploy.result }}" == "success" ]; then
          echo "app_instance_ip=${{ needs.terraform-deploy.outputs.app_instance_ip }}" >> $GITHUB_OUTPUT
          echo "load_balancer_ip=${{ needs.terraform-deploy.outputs.load_balancer_ip }}" >> $GITHUB_OUTPUT
        else
          # Get outputs from existing state
          cd infra
          terraform init -backend-config="bucket=myguy-terraform-state" \
                        -backend-config="key=${{ env.ENVIRONMENT }}/terraform.tfstate" \
                        -backend-config="region=us-east-1" \
                        -backend-config="endpoint=https://us-east-1.linodeobjects.com" \
                        -backend-config="skip_credentials_validation=true" \
                        -backend-config="skip_region_validation=true" \
                        -backend-config="skip_metadata_api_check=true"
          echo "app_instance_ip=$(terraform output -raw app_instance_ip)" >> $GITHUB_OUTPUT
          echo "load_balancer_ip=$(terraform output -raw load_balancer_ip)" >> $GITHUB_OUTPUT
        fi

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ steps.infrastructure.outputs.app_instance_ip }} >> ~/.ssh/known_hosts

    - name: Create Docker Compose Override for Production
      run: |
        cat > docker-compose.production.yml << 'EOF'
        version: '3.8'
        services:
          frontend:
            environment:
              - VITE_API_URL=https://myguy.work
              - VITE_WS_URL=https://myguy.work
              - NODE_ENV=production
            restart: unless-stopped
          
          api:
            environment:
              - GIN_MODE=release
              - DB_CONNECTION=${DB_CONNECTION}
              - JWT_SECRET=${JWT_SECRET}
            restart: unless-stopped
            deploy:
              resources:
                limits:
                  memory: 512M
          
          store-service:
            environment:
              - GIN_MODE=release
              - DB_CONNECTION=${DB_CONNECTION}
              - JWT_SECRET=${JWT_SECRET}
            restart: unless-stopped
            deploy:
              resources:
                limits:
                  memory: 512M
          
          chat-websocket-service:
            environment:
              - NODE_ENV=production
              - DB_CONNECTION=${DB_CONNECTION}
              - CLIENT_URL=https://myguy.work
            restart: unless-stopped
            deploy:
              resources:
                limits:
                  memory: 256M
        EOF

    - name: Run Pre-deployment Tests
      run: |
        # Install dependencies for testing
        npm install
        
        # Run frontend build test
        cd frontend && npm install && npm run build
        
        # Basic Go tests
        cd ../backend && go test ./... -short
        
        echo "Pre-deployment tests passed"

    - name: Deploy Application
      run: |
        # Create deployment package
        tar -czf deployment.tar.gz \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='infra' \
          --exclude='.github' \
          .
        
        # Copy to server
        scp -i ~/.ssh/id_rsa deployment.tar.gz root@${{ steps.infrastructure.outputs.app_instance_ip }}:/tmp/
        
        # Deploy on server
        ssh -i ~/.ssh/id_rsa root@${{ steps.infrastructure.outputs.app_instance_ip }} << 'EOF'
          set -e
          
          echo "Starting production deployment..."
          
          # Create backup of current deployment
          if [ -d "/opt/myguy-backup" ]; then
            rm -rf /opt/myguy-backup-old
            mv /opt/myguy-backup /opt/myguy-backup-old
          fi
          cp -r /opt/myguy /opt/myguy-backup
          
          # Extract deployment
          cd /opt/myguy
          tar -xzf /tmp/deployment.tar.gz --strip-components=0
          rm /tmp/deployment.tar.gz
          
          # Source environment variables
          source .env
          
          # Pull and build images without downtime
          docker compose -f docker-compose.yml -f docker-compose.production.yml build
          
          # Rolling deployment
          echo "Starting rolling deployment..."
          
          # Start new containers with different names
          docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --force-recreate
          
          # Wait for services to be ready
          echo "Waiting for services to start..."
          sleep 45
          
          # Health checks
          echo "Running health checks..."
          
          # Check main backend
          for i in {1..10}; do
            if curl -f http://localhost:8080/health; then
              echo "✅ Main backend healthy"
              break
            fi
            echo "⏳ Waiting for main backend... ($i/10)"
            sleep 5
          done
          
          # Check store service
          for i in {1..10}; do
            if curl -f http://localhost:8081/health; then
              echo "✅ Store service healthy"
              break
            fi
            echo "⏳ Waiting for store service... ($i/10)"
            sleep 5
          done
          
          # Check chat service
          for i in {1..10}; do
            if curl -f http://localhost:8082/health; then
              echo "✅ Chat service healthy"
              break
            fi
            echo "⏳ Waiting for chat service... ($i/10)"
            sleep 5
          done
          
          # Run database migrations
          echo "Running database migrations..."
          docker compose exec -T api go run cmd/migrate/main.go || echo "Migration completed or no new migrations"
          
          # Reload nginx
          systemctl reload nginx
          
          # Clean up old images
          docker system prune -f
          
          echo "✅ Production deployment completed successfully"
        EOF

    - name: Post-deployment Tests
      run: |
        # Wait a bit for everything to settle
        sleep 30
        
        # Test application endpoints
        curl -f https://myguy.work/health || exit 1
        curl -f https://myguy.work/api/v1/server-time || exit 1
        
        echo "✅ Post-deployment tests passed"

    - name: Update DNS (if load balancer IP changed)
      if: needs.terraform-deploy.result == 'success' && steps.infrastructure.outputs.load_balancer_ip
      run: |
        echo "🌐 Load Balancer IP: ${{ steps.infrastructure.outputs.load_balancer_ip }}"
        echo "Please update DNS A record for myguy.work to point to: ${{ steps.infrastructure.outputs.load_balancer_ip }}"

    - name: Notify Deployment Success
      if: success()
      run: |
        echo "🎉 Production deployment successful!"
        echo "Application URL: https://myguy.work"
        echo "Commit: ${GITHUB_SHA:0:7}"

    - name: Rollback on Failure
      if: failure()
      run: |
        echo "❌ Deployment failed, initiating rollback..."
        ssh -i ~/.ssh/id_rsa root@${{ steps.infrastructure.outputs.app_instance_ip }} << 'EOF'
          if [ -d "/opt/myguy-backup" ]; then
            echo "Rolling back to previous version..."
            cd /opt/myguy-backup
            source .env
            docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
            systemctl reload nginx
            echo "✅ Rollback completed"
          else
            echo "No backup found for rollback"
          fi
        EOF

    - name: Cleanup
      if: always()
      run: |
        rm -f ~/.ssh/id_rsa
        rm -f deployment.tar.gz || true