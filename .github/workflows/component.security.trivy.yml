name: Run trivy security scan

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  security-events: write
  pull-requests: read

env:
  REGISTRY: ${{ vars.REGISTRY }}

jobs:
  get-tag:
    name: Get Image Tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.get_release.outputs.image_tag }}
    steps:
      - name: Get latest release tag
        id: get_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if LATEST_TAG=$(gh release view --repo ${{ github.repository }} --json tagName --jq '.tagName' 2>/dev/null); then
            echo "Found latest release: $LATEST_TAG"
            echo "image_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "No releases found, using 'latest'"
            echo "image_tag=latest" >> $GITHUB_OUTPUT
          fi

  scan-api:
    name: Scan API Service
    needs: get-tag
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ env.REGISTRY }}/myguy-api:${{ needs.get-tag.outputs.image_tag }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.REGISTRY }}/myguy-api:${{ needs.get-tag.outputs.image_tag }}'
          format: 'sarif'
          output: 'trivy-api.sarif'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-api.sarif'
          category: 'trivy-api'

  scan-store-service:
    name: Scan Store Service
    needs: get-tag
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ env.REGISTRY }}/myguy-store-service:${{ needs.get-tag.outputs.image_tag }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.REGISTRY }}/myguy-store-service:${{ needs.get-tag.outputs.image_tag }}'
          format: 'sarif'
          output: 'trivy-store-service.sarif'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-store-service.sarif'
          category: 'trivy-store-service'

  scan-chat-service:
    name: Scan Chat Websocket Service
    needs: get-tag
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ env.REGISTRY }}/myguy-chat-websocket-service:${{ needs.get-tag.outputs.image_tag }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ env.REGISTRY }}/myguy-chat-websocket-service:${{ needs.get-tag.outputs.image_tag }}'
          format: 'sarif'
          output: 'trivy-chat-service.sarif'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-chat-service.sarif'
          category: 'trivy-chat-service'
