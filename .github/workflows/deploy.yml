name: Deploy

on:
  # push:
  #   branches: [main]
  #   tags:
  #     - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # Run tests first
  test:
    uses: ./.github/workflows/test.yml

  # Build Docker images
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      backend_image: ${{ steps.meta-backend.outputs.tags }}
      store_image: ${{ steps.meta-store.outputs.tags }}
      chat_image: ${{ steps.meta-chat.outputs.tags }}
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Backend
      - name: Extract metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Store Service
      - name: Extract metadata (Store)
        id: meta-store
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/store-service
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push Store Service
        uses: docker/build-push-action@v5
        with:
          context: ./store-service
          push: true
          tags: ${{ steps.meta-store.outputs.tags }}
          labels: ${{ steps.meta-store.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Chat Service
      - name: Extract metadata (Chat)
        id: meta-chat
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/chat-websocket-service
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push Chat Service
        uses: docker/build-push-action@v5
        with:
          context: ./chat-websocket-service
          push: true
          tags: ${{ steps.meta-chat.outputs.tags }}
          labels: ${{ steps.meta-chat.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend
      - name: Extract metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_STORE_API_URL=${{ vars.VITE_STORE_API_URL }}
            VITE_CHAT_API_URL=${{ vars.VITE_CHAT_API_URL }}
            VITE_CHAT_WS_URL=${{ vars.VITE_CHAT_WS_URL }}

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/myguy

            # Pull latest images
            docker pull ${{ needs.build.outputs.backend_image }}
            docker pull ${{ needs.build.outputs.store_image }}
            docker pull ${{ needs.build.outputs.chat_image }}
            docker pull ${{ needs.build.outputs.frontend_image }}

            # Update docker-compose with new image tags
            export BACKEND_IMAGE="${{ needs.build.outputs.backend_image }}"
            export STORE_IMAGE="${{ needs.build.outputs.store_image }}"
            export CHAT_IMAGE="${{ needs.build.outputs.chat_image }}"
            export FRONTEND_IMAGE="${{ needs.build.outputs.frontend_image }}"

            # Deploy with zero downtime
            docker-compose -f docker-compose.prod.yml up -d --no-deps --build

            # Health check
            sleep 10
            curl -f http://localhost:8080/health || exit 1
            curl -f http://localhost:8081/health || exit 1
            curl -f http://localhost:8082/health || exit 1

            echo "Staging deployment successful!"

      - name: Notify deployment
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "Staging deployment ${{ job.status }}: ${{ github.repository }}@${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Deploy to production (manual trigger or tag)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/myguy

            # Backup current state
            docker-compose -f docker-compose.prod.yml ps > /tmp/pre-deploy-state.txt

            # Pull latest images
            docker pull ${{ needs.build.outputs.backend_image }}
            docker pull ${{ needs.build.outputs.store_image }}
            docker pull ${{ needs.build.outputs.chat_image }}
            docker pull ${{ needs.build.outputs.frontend_image }}

            # Update docker-compose with new image tags
            export BACKEND_IMAGE="${{ needs.build.outputs.backend_image }}"
            export STORE_IMAGE="${{ needs.build.outputs.store_image }}"
            export CHAT_IMAGE="${{ needs.build.outputs.chat_image }}"
            export FRONTEND_IMAGE="${{ needs.build.outputs.frontend_image }}"

            # Deploy with zero downtime
            docker-compose -f docker-compose.prod.yml up -d --no-deps --build

            # Health check with retries
            for i in {1..5}; do
              sleep 10
              if curl -f http://localhost:8080/health && \
                 curl -f http://localhost:8081/health && \
                 curl -f http://localhost:8082/health; then
                echo "Health checks passed!"
                exit 0
              fi
              echo "Retry $i/5..."
            done

            echo "Health checks failed, rolling back..."
            docker-compose -f docker-compose.prod.yml down
            # Rollback logic would go here
            exit 1

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true

      - name: Notify deployment
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "Production deployment ${{ job.status }}: ${{ github.repository }}@${{ github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
