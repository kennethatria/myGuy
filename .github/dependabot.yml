version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"

  # Go - backend
  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "go"
      - "backend"

  # Go - store-service
  - package-ecosystem: "gomod"
    directory: "/store-service"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "go"
      - "store-service"

  # npm - frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "npm"
      - "frontend"
    ignore:
      # Avoid major version bumps on core Vue ecosystem packages without manual review
      - dependency-name: "vue"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vue-router"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pinia"
        update-types: ["version-update:semver-major"]

  # npm - chat-websocket-service
  - package-ecosystem: "npm"
    directory: "/chat-websocket-service"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "npm"
      - "chat-service"
    ignore:
      # Avoid major version bumps on socket.io without manual review (protocol breaking changes)
      - dependency-name: "socket.io"
        update-types: ["version-update:semver-major"]
      - dependency-name: "socket.io-client"
        update-types: ["version-update:semver-major"]
